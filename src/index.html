<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes App</title>
  </head>
  <body>
    <!-- Web Component 1: App Bar -->
    <app-bar brand="Notes" subtitle="App"></app-bar>

    <!-- Loading Indicator Web Component -->
    <loading-indicator></loading-indicator>

    <div class="main-layout">
      <!-- Web Component 2: Note Form -->
      <section>
        <h2 class="section-title">Tambah Catatan</h2>
        <note-form max-title="100" max-body="500"></note-form>
      </section>

      <!-- Tab Aktif / Arsip -->
      <section>
        <div class="tabs">
          <button class="tab-btn active" data-tab="active">
            Catatan Aktif
          </button>
          <button class="tab-btn" data-tab="archived">Diarsipkan</button>
        </div>

        <h2 class="section-title notes-section-title">Catatan Aktif</h2>

        <!-- Web Component 3 & 4: Notes List -->
        <notes-list></notes-list>
      </section>
    </div>

    <div class="toast" id="toast"></div>
  </body>
</html>
